<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>点位地图</title>
    <style>
        :root {
            --panel: rgba(255, 255, 255, 0.94);
            --line: #d9e0ea;
            --text: #103b5a;
            --muted: #5b6472;
            --online: #1b8bc8;
            --offline: #d9534f;
            --unknown: #8a8f98;
        }

        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            font-family: "Microsoft YaHei UI", "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #eef5fb 0%, #d7e9f5 100%);
            color: var(--text);
            overflow: hidden;
        }

        .shell { position: relative; width: 100%; height: 100%; }
        .map { position: absolute; inset: 0; }

        .overlay, .info {
            position: absolute;
            width: min(360px, calc(100vw - 32px));
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 18px;
            box-shadow: 0 18px 48px rgba(15, 76, 129, 0.16);
            padding: 16px;
            backdrop-filter: blur(8px);
        }

        .overlay { top: 16px; left: 16px; }
        .info {
            top: 16px;
            right: 16px;
            max-height: calc(100% - 32px);
            overflow: auto;
        }

        h1, h2 { margin: 0 0 10px; }
        h1 { font-size: 20px; }
        h2 { font-size: 18px; }

        .status { font-size: 13px; color: var(--muted); line-height: 1.6; }
        .hint { font-size: 13px; color: var(--muted); line-height: 1.6; }

        .stats {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
            margin-top: 14px;
        }

        .section {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--line);
        }

        .stat {
            border: 1px solid var(--line);
            border-radius: 14px;
            background: #fff;
            padding: 10px 12px;
        }

        .stat span { display: block; font-size: 12px; color: var(--muted); }
        .stat strong { display: block; margin-top: 6px; font-size: 20px; }

        .info-grid {
            display: grid;
            gap: 10px;
        }

        .kv {
            display: grid;
            grid-template-columns: 88px 1fr;
            gap: 10px;
            align-items: start;
            font-size: 13px;
            color: var(--muted);
        }

        .kv span { word-break: break-all; }
        .kv b {
            color: var(--text);
            font-weight: 600;
            word-break: break-all;
        }

        .unlocated-summary {
            font-size: 12px;
            color: var(--muted);
            line-height: 1.6;
        }

        .unlocated-list {
            display: grid;
            gap: 10px;
            margin-top: 10px;
        }

        .unlocated-item {
            border: 1px solid var(--line);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.96);
            padding: 12px;
        }

        .unlocated-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            word-break: break-all;
        }

        .unlocated-grid {
            display: grid;
            gap: 8px;
            margin-top: 10px;
        }

        .empty {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            background: var(--panel);
            border: 1px dashed var(--line);
            border-radius: 18px;
            padding: 18px 22px;
            color: var(--muted);
            display: none;
            text-align: center;
        }

        .marker {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            border-radius: 999px;
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.16);
            white-space: nowrap;
        }

        .marker-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.96);
        }

        .marker.online { background: var(--online); }
        .marker.offline { background: var(--offline); }
        .marker.unknown { background: var(--unknown); }
    </style>
</head>
<body>
    <div class="shell">
        <div id="map" class="map"></div>

        <section class="overlay">
            <h1>地图状态</h1>
            <div id="status" class="status">正在等待本地点位数据...</div>
            <div class="stats">
                <div class="stat"><span>已上图</span><strong id="renderedCount">0</strong></div>
                <div class="stat"><span>在线</span><strong id="onlineCount">0</strong></div>
                <div class="stat"><span>离线</span><strong id="offlineCount">0</strong></div>
                <div class="stat"><span>未定位</span><strong id="unlocatedCount">0</strong></div>
            </div>
        </section>

        <section class="info">
            <h2 id="infoTitle">点位信息</h2>
            <div id="infoHint" class="hint">点击地图上的点位查看详情。</div>
            <div id="infoGrid" class="info-grid"></div>

            <div class="section">
                <h2>未定位点位</h2>
                <div id="unlocatedSummary" class="unlocated-summary">暂无未定位点位。</div>
                <div id="unlocatedList" class="unlocated-list"></div>
            </div>
        </section>

        <div id="empty" class="empty">正在准备地图...</div>
    </div>

    <script>
        const state = {
            map: null,
            markers: [],
            selected: null
        };

        const statusEl = document.getElementById("status");
        const renderedEl = document.getElementById("renderedCount");
        const onlineEl = document.getElementById("onlineCount");
        const offlineEl = document.getElementById("offlineCount");
        const unlocatedEl = document.getElementById("unlocatedCount");
        const emptyEl = document.getElementById("empty");
        const infoTitleEl = document.getElementById("infoTitle");
        const infoHintEl = document.getElementById("infoHint");
        const infoGridEl = document.getElementById("infoGrid");
        const unlocatedSummaryEl = document.getElementById("unlocatedSummary");
        const unlocatedListEl = document.getElementById("unlocatedList");

        const escapeHtml = (value) => String(value ?? "").replace(/[&<>"']/g, (ch) => ({
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            "\"": "&quot;",
            "'": "&#39;"
        }[ch]));

        function displayText(value) {
            if (value === null || value === undefined) {
                return "无";
            }

            const text = String(value).trim();
            return text ? text : "无";
        }

        function displayName(value) {
            const text = String(value ?? "").trim();
            return text || "未命名点位";
        }

        function onlineStatusText(value) {
            if (value === 1) {
                return "在线";
            }

            if (value === 0) {
                return "离线";
            }

            if (value === 2) {
                return "休眠（普通）";
            }

            if (value === 3) {
                return "休眠（保活/AOV）";
            }

            return "未知";
        }

        function readLocation(point) {
            const label = String(point.locationLabel || "").trim() || "位置";
            const value = String(point.locationDisplay || "").trim() || displayText(point.location);
            return { label, value };
        }

        function renderPairs(rows) {
            return rows
                .map(([label, value]) => `<div class="kv"><span>${escapeHtml(label)}</span><b>${escapeHtml(value)}</b></div>`)
                .join("");
        }

        function post(type, payload = {}) {
            if (window.chrome && window.chrome.webview) {
                window.chrome.webview.postMessage(Object.assign({ type }, payload));
            }
        }

        function setStats(stats) {
            renderedEl.textContent = stats.renderedCount ?? 0;
            onlineEl.textContent = stats.onlineCount ?? 0;
            offlineEl.textContent = stats.offlineCount ?? 0;
            unlocatedEl.textContent = stats.unlocatedCount ?? 0;
        }

        function setStatus(text) {
            statusEl.textContent = text || "";
        }

        function showEmpty(message) {
            emptyEl.textContent = message;
            emptyEl.style.display = "block";
        }

        function hideEmpty() {
            emptyEl.style.display = "none";
        }

        function formatCoordinate(value) {
            const number = Number(value);
            if (!Number.isFinite(number)) {
                return "";
            }

            return number.toFixed(6).replace(/0+$/u, "").replace(/\.$/u, "");
        }

        function rawCoordinateText(point) {
            if (!point.hasRawCoordinate) {
                return "无";
            }

            return `${displayText(point.rawLatitude)} / ${displayText(point.rawLongitude)}`;
        }

        function mapCoordinateText(point) {
            if (point.hasMapCoordinate) {
                return `${displayText(point.mapLatitude)} / ${displayText(point.mapLongitude)}`;
            }

            if (point.coordinateState === "failed") {
                return "坐标转换失败，需人工确认";
            }

            return "无";
        }

        function coordinateStateText(point) {
            if (point.coordinateStateText) {
                return point.coordinateStateText;
            }

            if (point.hasMapCoordinate) {
                return "已转换为高德";
            }

            if (!point.hasRawCoordinate) {
                return "无坐标";
            }

            return "待转换";
        }

        function coordinateWarningText(point) {
            if (point.coordinateWarning) {
                return point.coordinateWarning;
            }

            if (point.hasMapCoordinate) {
                return "地图 marker 仅使用转换后的高德坐标。";
            }

            if (!point.hasRawCoordinate) {
                return "当前无平台坐标，无法执行百度转高德。";
            }

            return "坐标转换失败，需人工确认。";
        }

        function setInfo(point) {
            state.selected = point || null;
            if (!point) {
                infoTitleEl.textContent = "点位信息";
                infoHintEl.style.display = "block";
                infoHintEl.textContent = "点击地图上的点位查看详情。";
                infoGridEl.innerHTML = "";
                return;
            }

            const location = readLocation(point);
            infoTitleEl.textContent = "点位信息";
            infoHintEl.style.display = "none";
            infoGridEl.innerHTML = renderPairs([
                ["设备名称", displayName(point.deviceName)],
                ["设备编码", displayText(point.deviceCode)],
                ["分组编号", displayText(point.groupId)],
                [location.label, location.value],
                ["在线状态", point.onlineStatusText || onlineStatusText(point.onlineStatus)],
                ["原始坐标来源", displayText(point.coordinateSourceText || point.coordinateSource || "百度")],
                ["平台原始坐标", rawCoordinateText(point)],
                ["地图渲染坐标", mapCoordinateText(point)],
                ["坐标状态", coordinateStateText(point)],
                ["坐标说明", coordinateWarningText(point)],
                ["云台状态", displayText(point.cloudStatus)],
                ["布防状态", displayText(point.bandStatus)],
                ["来源标识", displayText(point.sourceTypeFlag)]
            ]);
        }

        function buildUnlocatedReason(point) {
            if (!point.hasRawCoordinate) {
                return "平台未提供坐标";
            }

            return point.coordinateState === "failed"
                ? "坐标转换失败，需人工确认"
                : coordinateStateText(point);
        }

        function setUnlocated(points) {
            const unlocated = points.filter((point) => !point.hasMapCoordinate);
            if (unlocated.length === 0) {
                unlocatedSummaryEl.textContent = "暂无未定位点位。";
                unlocatedListEl.innerHTML = "";
                return;
            }

            const failedCount = unlocated.filter((point) => point.coordinateState === "failed").length;
            const missingCount = unlocated.filter((point) => !point.hasRawCoordinate).length;
            unlocatedSummaryEl.textContent = failedCount > 0
                ? `共 ${unlocated.length} 个未上图点位，其中 ${failedCount} 个坐标转换失败、${missingCount} 个平台未提供坐标。`
                : `共 ${unlocated.length} 个未定位点位。`;
            unlocatedListEl.innerHTML = unlocated.map((point) => {
                const location = readLocation(point);
                return `
                    <article class="unlocated-item">
                        <div class="unlocated-name">${escapeHtml(displayName(point.deviceName))}</div>
                        <div class="unlocated-grid">
                            ${renderPairs([
                                ["设备编码", displayText(point.deviceCode)],
                                ["分组编号", displayText(point.groupId)],
                                ["平台原始坐标", rawCoordinateText(point)],
                                ["未上图原因", buildUnlocatedReason(point)],
                                ["说明", coordinateWarningText(point)],
                                [location.label, location.value]
                            ])}
                        </div>
                    </article>`;
            }).join("");
        }

        async function ensureMapScript(config) {
            if (window.AMap) {
                return;
            }

            if (config.securityJsCode) {
                window._AMapSecurityConfig = {
                    securityJsCode: config.securityJsCode
                };
            }

            await new Promise((resolve, reject) => {
                const script = document.createElement("script");
                script.src = `https://webapi.amap.com/maps?v=${encodeURIComponent(config.jsApiVersion || "2.0")}&key=${encodeURIComponent(config.jsKey)}`;
                script.onload = () => resolve();
                script.onerror = () => reject(new Error("高德地图脚本加载失败，请检查 Key 配置或网络连接。"));
                document.head.appendChild(script);
            });
        }

        function markerClass(point) {
            if (point.onlineStatus === 1) {
                return "online";
            }

            if (point.onlineStatus === 0) {
                return "offline";
            }

            return "unknown";
        }

        function buildMarker(point) {
            const wrap = document.createElement("div");
            const cls = markerClass(point);
            wrap.className = `marker ${cls}`;
            wrap.innerHTML = `<span class="marker-dot"></span><span>${escapeHtml(displayName(point.deviceName))}</span>`;
            return wrap;
        }

        function showPoint(point) {
            setInfo(point);
        }

        function resolveConvertedLocation(result) {
            const location = Array.isArray(result?.locations)
                ? result.locations[0]
                : result?.locations || result;

            if (!location) {
                throw new Error("高德坐标转换未返回结果。");
            }

            const lng = typeof location.getLng === "function"
                ? location.getLng()
                : Array.isArray(location)
                    ? location[0]
                    : location.lng;
            const lat = typeof location.getLat === "function"
                ? location.getLat()
                : Array.isArray(location)
                    ? location[1]
                    : location.lat;

            if (!Number.isFinite(Number(lng)) || !Number.isFinite(Number(lat))) {
                throw new Error("高德坐标转换结果无效。");
            }

            return {
                lng: formatCoordinate(lng),
                lat: formatCoordinate(lat)
            };
        }

        async function convertPoint(point, rawCoordinateSystem) {
            if (!point.hasRawCoordinate) {
                return Object.assign({}, point, {
                    coordinateState: "missing",
                    coordinateStateText: "平台未提供坐标",
                    coordinateWarning: "平台未提供坐标，当前不进入上图。",
                    hasMapCoordinate: false,
                    mapLatitude: "",
                    mapLongitude: ""
                });
            }

            if (!window.AMap || typeof window.AMap.convertFrom !== "function") {
                return Object.assign({}, point, {
                    coordinateState: "failed",
                    coordinateStateText: "坐标转换失败，需人工确认",
                    coordinateWarning: "高德地图坐标转换能力不可用，需人工确认。",
                    hasMapCoordinate: false,
                    mapLatitude: "",
                    mapLongitude: ""
                });
            }

            return await new Promise((resolve) => {
                const lng = Number(point.rawLongitude);
                const lat = Number(point.rawLatitude);

                window.AMap.convertFrom([lng, lat], rawCoordinateSystem || "baidu", (status, result) => {
                    if (status !== "complete") {
                        resolve(Object.assign({}, point, {
                            coordinateState: "failed",
                            coordinateStateText: "坐标转换失败，需人工确认",
                            coordinateWarning: "高德坐标转换未完成，需人工确认。",
                            hasMapCoordinate: false,
                            mapLatitude: "",
                            mapLongitude: ""
                        }));
                        return;
                    }

                    try {
                        const converted = resolveConvertedLocation(result);
                        resolve(Object.assign({}, point, {
                            coordinateState: "converted",
                            coordinateStateText: "已转换为高德",
                            coordinateWarning: "地图 marker 仅使用转换后的高德坐标。",
                            hasMapCoordinate: true,
                            mapLatitude: converted.lat,
                            mapLongitude: converted.lng
                        }));
                    } catch (error) {
                        resolve(Object.assign({}, point, {
                            coordinateState: "failed",
                            coordinateStateText: "坐标转换失败，需人工确认",
                            coordinateWarning: error && error.message
                                ? error.message
                                : "高德坐标转换结果无效，需人工确认。",
                            hasMapCoordinate: false,
                            mapLatitude: "",
                            mapLongitude: ""
                        }));
                    }
                });
            });
        }

        async function convertPoints(points, mapCfg) {
            const candidates = points.filter((point) => point.hasRawCoordinate);
            post("coordinate-conversion-started", { total: candidates.length });

            const converted = await Promise.all(
                points.map((point) => convertPoint(point, mapCfg.rawCoordinateSystem || "baidu"))
            );

            const failed = converted.filter((point) => point.coordinateState === "failed");
            if (failed.length > 0) {
                const message = failed
                    .slice(0, 3)
                    .map((point) => `${displayName(point.deviceName)}(${displayText(point.deviceCode)})`)
                    .join(" | ");
                post("coordinate-conversion-failed", {
                    failedCount: failed.length,
                    message: message || "存在坐标转换失败点位，需人工确认。"
                });
            }

            post("coordinate-conversion-completed", {
                renderedCount: converted.filter((point) => point.hasMapCoordinate).length,
                missingCount: converted.filter((point) => !point.hasRawCoordinate).length,
                failedCount: failed.length
            });

            return converted;
        }

        function buildStatusText(points) {
            const total = points.length;
            const renderedCount = points.filter((point) => point.hasMapCoordinate).length;
            const missingCount = points.filter((point) => !point.hasRawCoordinate).length;
            const failedCount = points.filter((point) => point.coordinateState === "failed").length;

            if (failedCount > 0) {
                return `已读取 ${total} 个本地点位，其中 ${renderedCount} 个完成百度转高德并上图，${missingCount} 个无坐标，${failedCount} 个坐标转换失败，需人工确认。`;
            }

            return `已读取 ${total} 个本地点位，其中 ${renderedCount} 个已按百度转高德后上图，${missingCount} 个无坐标。`;
        }

        function updateSummary(points) {
            setStats({
                renderedCount: points.filter((point) => point.hasMapCoordinate).length,
                onlineCount: points.filter((point) => point.onlineStatus === 1).length,
                offlineCount: points.filter((point) => point.onlineStatus === 0).length,
                unlocatedCount: points.filter((point) => !point.hasMapCoordinate).length
            });
            setStatus(buildStatusText(points));
            setUnlocated(points);
        }

        function renderMap(points) {
            const renderable = points.filter((point) => point.hasMapCoordinate);
            if (!state.map) {
                state.map = new AMap.Map("map", {
                    zoom: 4,
                    center: [105, 35],
                    viewMode: "2D"
                });
            }

            state.map.clearMap();
            state.markers = [];

            renderable.forEach((point) => {
                const lng = Number(point.mapLongitude);
                const lat = Number(point.mapLatitude);
                if (!Number.isFinite(lng) || !Number.isFinite(lat)) {
                    return;
                }

                const marker = new AMap.Marker({
                    position: [lng, lat],
                    content: buildMarker(point),
                    offset: new AMap.Pixel(-18, -18)
                });

                marker.on("click", () => showPoint(point));
                state.map.add(marker);
                state.markers.push(marker);
            });

            if (state.markers.length > 0) {
                state.map.setFitView(state.markers);
                hideEmpty();
                if (!state.selected || !state.selected.hasMapCoordinate) {
                    showPoint(renderable[0]);
                }
            } else {
                state.map.setZoomAndCenter(4, [105, 35]);
                showEmpty("暂无可上图点位，请检查平台坐标或坐标转换结果。");
                setInfo(null);
            }
        }

        async function renderBootstrap(bootstrap) {
            setStatus(bootstrap.statusText || "");
            setStats(bootstrap.stats || {});

            const mapCfg = bootstrap.map || {};
            const points = Array.isArray(bootstrap.points) ? bootstrap.points : [];

            if (!mapCfg.shouldLoadMap) {
                setUnlocated(points);
                showEmpty(mapCfg.hasMapKey ? "本地点位数据不可用，暂不加载地图。" : "缺少高德地图 Key，无法加载地图。");
                setInfo(null);
                return;
            }

            try {
                await ensureMapScript(mapCfg);
                const resolvedPoints = mapCfg.pointsPreconverted
                    ? points
                    : await convertPoints(points, mapCfg);
                updateSummary(resolvedPoints);
                renderMap(resolvedPoints);
            } catch (error) {
                const message = error && error.message
                    ? error.message
                    : "高德地图脚本加载失败，请检查 Key 配置或网络连接。";
                showEmpty(message);
                post("map-error", { message });
                setInfo(null);
            }
        }

        window.chrome?.webview?.addEventListener("message", (event) => {
            const data = event.data || {};
            if (data.type === "bootstrap") {
                renderBootstrap(data);
            }
        });

        window.addEventListener("DOMContentLoaded", () => {
            post("ready");
        });
    </script>
</body>
</html>
