<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>地图宿主占位</title>
    <style>
        body {
            margin: 0;
            font-family: "Microsoft YaHei UI", sans-serif;
            background: linear-gradient(135deg, #eef5fb 0%, #d7e9f5 100%);
            color: #103b5a;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .panel {
            width: min(560px, 90vw);
            padding: 32px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.86);
            border: 1px solid rgba(16, 59, 90, 0.12);
            box-shadow: 0 18px 48px rgba(15, 76, 129, 0.16);
        }

        h1 {
            margin: 0 0 12px;
            font-size: 28px;
        }

        p {
            margin: 0;
            line-height: 1.7;
        }
    </style>
</head>
<body>
    <section class="panel">
        <h1>地图宿主占位</h1>
        <p>当前轮次不做真实点位渲染。WPF 地图承载方式已固定为 WebView2，后续轮次可在此页接入高德地图 JS API 与宿主消息桥。</p>
    </section>
</body>
</html>
