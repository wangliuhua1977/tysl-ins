<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <title>CoordConvHost</title>
</head>
<body>
    <script>
        const BatchProtocolType = "coord-conversion-batch";
        const BatchProtocolVersion = "1.0";
        const ReadyProtocolType = "coord-conv-ready";
        const ReadyProtocolVersion = "1.0";
        const DefaultRawCoordinateSystem = "baidu";
        const CallbackTimeoutMs = 10000;
        const SummaryLimit = 300;

        const hostState = {
            config: null,
            domReady: document.readyState !== "loading",
            ready: false,
            readyError: "",
            readyPromise: null,
            scriptLoadPromise: null,
            scriptLoaded: false,
            hasAmap: false,
            hasConvertFrom: false
        };

        function postHostMessage(type, payload) {
            if (!window.chrome || !window.chrome.webview) {
                return;
            }

            window.chrome.webview.postMessage(Object.assign({ type }, payload || {}));
        }

        function postLog(message, payload, level) {
            postHostMessage("coord-conv-log", Object.assign(
                {
                    message,
                    level: level || "info"
                },
                payload || {}));
        }

        function summarize(value, maxLength) {
            const limit = typeof maxLength === "number" ? maxLength : SummaryLimit;

            let text = "";
            if (typeof value === "string") {
                text = value;
            } else if (value !== null && value !== undefined) {
                try {
                    text = JSON.stringify(value);
                } catch {
                    text = String(value);
                }
            }

            if (!text) {
                return "";
            }

            return text.length <= limit
                ? text
                : text.slice(0, limit);
        }

        function valueKind(value) {
            if (Array.isArray(value)) {
                return "array";
            }

            if (value === null) {
                return "null";
            }

            return typeof value;
        }

        function parseJsonMaybe(value) {
            if (typeof value !== "string") {
                return null;
            }

            const text = value.trim();
            if (!text) {
                return null;
            }

            if ((text.startsWith("{") && text.endsWith("}")) || (text.startsWith("[") && text.endsWith("]"))) {
                try {
                    return JSON.parse(text);
                } catch {
                    return null;
                }
            }

            return null;
        }

        function toFiniteCoordinate(value) {
            const number = Number(value);
            return Number.isFinite(number) ? number : null;
        }

        function formatCoordinate(value) {
            return Number(value).toFixed(6);
        }

        function createBatchError(stage, message, errorCode, deviceCode) {
            return {
                stage: stage || "unknown",
                message: message || "No detailed error message returned.",
                errorCode: errorCode || "",
                deviceCode: deviceCode || ""
            };
        }

        function createEnvelope(requestedCount, items, errors) {
            const safeItems = Array.isArray(items) ? items.filter(Boolean) : [];
            const safeErrors = Array.isArray(errors) ? errors.filter(Boolean) : [];

            return {
                type: BatchProtocolType,
                protocolVersion: BatchProtocolVersion,
                requestedCount: typeof requestedCount === "number" ? requestedCount : safeItems.length,
                successCount: safeItems.filter((item) => item && item.hasMapCoordinate).length,
                failedCount: safeItems.filter((item) => item && item.coordinateState === "failed").length,
                items: safeItems,
                errors: safeErrors
            };
        }

        function createReadyPayload(ready, errorStage, errorMessage) {
            return {
                type: ReadyProtocolType,
                protocolVersion: ReadyProtocolVersion,
                ready: !!ready,
                scriptLoaded: hostState.scriptLoaded,
                hasAmap: hostState.hasAmap,
                hasConvertFrom: hostState.hasConvertFrom,
                errorStage: errorStage || "",
                errorMessage: errorMessage || ""
            };
        }

        function buildItemBase(point, hasRawCoordinate) {
            return {
                deviceCode: point.deviceCode || "",
                hasRawCoordinate: !!hasRawCoordinate,
                hasMapCoordinate: false,
                mapSource: point.mapSource || "amap_js_convert_from_baidu",
                coordinateState: "failed",
                coordinateStateText: "Coordinate conversion failed.",
                rawLongitude: point.rawLongitude ?? null,
                rawLatitude: point.rawLatitude ?? null,
                mapLongitude: null,
                mapLatitude: null,
                amapStatus: "error",
                amapInfo: "",
                errorStage: "",
                errorCode: "",
                errorMessage: ""
            };
        }

        function buildFailedItem(point, options) {
            const safeOptions = options || {};
            const hasRawCoordinate = safeOptions.hasRawCoordinate !== undefined
                ? !!safeOptions.hasRawCoordinate
                : point.rawLatitude !== undefined && point.rawLongitude !== undefined;
            const item = buildItemBase(point, hasRawCoordinate);

            item.coordinateState = safeOptions.coordinateState || "failed";
            item.coordinateStateText = safeOptions.coordinateStateText || "Coordinate conversion failed.";
            item.mapSource = safeOptions.mapSource || item.mapSource;
            item.amapStatus = safeOptions.amapStatus || "error";
            item.amapInfo = safeOptions.amapInfo || "";
            item.errorStage = safeOptions.errorStage || "unknown";
            item.errorCode = safeOptions.errorCode || "";
            item.errorMessage = safeOptions.errorMessage || "Coordinate conversion failed.";

            return item;
        }

        function buildSuccessItem(point, resolved, amapStatus, amapInfo) {
            return {
                deviceCode: point.deviceCode || "",
                hasRawCoordinate: true,
                hasMapCoordinate: true,
                mapSource: point.mapSource || "amap_js_convert_from_baidu",
                coordinateState: "available",
                coordinateStateText: "Coordinate converted to GCJ-02.",
                rawLongitude: point.rawLongitude ?? null,
                rawLatitude: point.rawLatitude ?? null,
                mapLongitude: resolved.mapLongitude,
                mapLatitude: resolved.mapLatitude,
                amapStatus: amapStatus || "complete",
                amapInfo: amapInfo || "",
                errorStage: "",
                errorCode: "",
                errorMessage: ""
            };
        }

        function waitForDomReady() {
            if (hostState.domReady || document.readyState !== "loading") {
                hostState.domReady = true;
                return Promise.resolve();
            }

            return new Promise((resolve) => {
                document.addEventListener("DOMContentLoaded", () => {
                    hostState.domReady = true;
                    resolve();
                }, { once: true });
            });
        }

        function parseConfig(rawConfig) {
            if (!rawConfig) {
                return {};
            }

            if (typeof rawConfig === "string") {
                const text = rawConfig.trim();
                return text ? JSON.parse(text) : {};
            }

            return rawConfig;
        }

        function parseBatchRequest(rawJson) {
            const parsed = typeof rawJson === "string"
                ? JSON.parse(rawJson)
                : rawJson;

            if (Array.isArray(parsed)) {
                return {
                    batchId: "",
                    items: parsed
                };
            }

            if (parsed && typeof parsed === "object" && Array.isArray(parsed.items)) {
                return {
                    batchId: typeof parsed.batchId === "string" ? parsed.batchId : "",
                    items: parsed.items
                };
            }

            return {
                batchId: "",
                items: []
            };
        }

        async function loadAmapScript(config) {
            if (window.AMap && typeof window.AMap.convertFrom === "function") {
                hostState.scriptLoaded = true;
                hostState.hasAmap = true;
                hostState.hasConvertFrom = true;
                return;
            }

            if (!config || !config.jsKey) {
                throw new Error("AMap JS key is missing.");
            }

            if (hostState.scriptLoadPromise) {
                return hostState.scriptLoadPromise;
            }

            if (config.securityJsCode) {
                window._AMapSecurityConfig = {
                    securityJsCode: config.securityJsCode
                };
            }

            postLog("CoordConvHost script load started", {
                hasJsKey: !!config.jsKey,
                hasSecurityJsCode: !!config.securityJsCode,
                jsApiVersion: config.jsApiVersion || "2.0"
            });

            hostState.scriptLoadPromise = new Promise((resolve, reject) => {
                const script = document.createElement("script");
                script.src = `https://webapi.amap.com/maps?v=${encodeURIComponent(config.jsApiVersion || "2.0")}&key=${encodeURIComponent(config.jsKey)}`;
                script.onload = () => {
                    hostState.scriptLoaded = true;
                    hostState.hasAmap = !!window.AMap;
                    hostState.hasConvertFrom = !!(window.AMap && typeof window.AMap.convertFrom === "function");

                    if (!hostState.hasConvertFrom) {
                        const error = new Error("AMap JS SDK loaded without convertFrom.");
                        postLog("CoordConvHost script load failed", {
                            hasAmap: hostState.hasAmap,
                            hasConvertFrom: hostState.hasConvertFrom,
                            errorStage: "script_load",
                            errorMessage: error.message
                        }, "error");
                        hostState.scriptLoadPromise = null;
                        reject(error);
                        return;
                    }

                    postLog("CoordConvHost script load completed", {
                        hasAmap: hostState.hasAmap,
                        hasConvertFrom: hostState.hasConvertFrom
                    });
                    resolve();
                };
                script.onerror = () => {
                    const error = new Error("Failed to load AMap JS SDK.");
                    hostState.scriptLoaded = false;
                    hostState.hasAmap = false;
                    hostState.hasConvertFrom = false;
                    hostState.scriptLoadPromise = null;
                    postLog("CoordConvHost script load failed", {
                        errorStage: "script_load",
                        errorMessage: error.message
                    }, "error");
                    reject(error);
                };
                document.head.appendChild(script);
            });

            return hostState.scriptLoadPromise;
        }

        async function ensureReady(rawConfig) {
            if (hostState.ready && hostState.hasConvertFrom) {
                return createReadyPayload(true);
            }

            if (hostState.readyPromise) {
                return hostState.readyPromise;
            }

            const config = parseConfig(rawConfig || hostState.config || {});
            hostState.config = config;

            postLog("CoordConvHost ready started", {
                hasJsKey: !!config.jsKey,
                hasSecurityJsCode: !!config.securityJsCode,
                jsApiVersion: config.jsApiVersion || "2.0"
            });

            hostState.readyPromise = (async () => {
                await waitForDomReady();
                await loadAmapScript(config);

                hostState.ready = true;
                hostState.readyError = "";
                hostState.hasAmap = !!window.AMap;
                hostState.hasConvertFrom = !!(window.AMap && typeof window.AMap.convertFrom === "function");

                const payload = createReadyPayload(true);
                postHostMessage("coord-conv-ready", payload);
                postLog("CoordConvHost ready completed", {
                    hasAmap: payload.hasAmap,
                    hasConvertFrom: payload.hasConvertFrom
                });

                return payload;
            })().catch((error) => {
                const message = error && error.message
                    ? error.message
                    : "CoordConvHost ready failed.";
                hostState.ready = false;
                hostState.readyError = message;

                const payload = createReadyPayload(false, "script_load", message);
                postHostMessage("coord-conv-ready-failed", payload);
                postLog("CoordConvHost ready failed", {
                    errorStage: payload.errorStage,
                    errorMessage: payload.errorMessage,
                    hasAmap: payload.hasAmap,
                    hasConvertFrom: payload.hasConvertFrom
                }, "error");

                return payload;
            }).finally(() => {
                if (!hostState.ready) {
                    hostState.readyPromise = null;
                }
            });

            return hostState.readyPromise;
        }

        function splitLocationString(text) {
            if (text.includes("|")) {
                return text.split("|").map((item) => item.trim()).filter(Boolean);
            }

            if (text.includes(";")) {
                return text.split(";").map((item) => item.trim()).filter(Boolean);
            }

            return [text];
        }

        function normalizeLocations(rawLocations) {
            if (Array.isArray(rawLocations)) {
                return rawLocations;
            }

            if (rawLocations === null || rawLocations === undefined) {
                return [];
            }

            if (typeof rawLocations === "string") {
                const text = rawLocations.trim();
                if (!text) {
                    return [];
                }

                const parsed = parseJsonMaybe(text);
                if (Array.isArray(parsed)) {
                    return parsed;
                }

                if (parsed && typeof parsed === "object") {
                    return [parsed];
                }

                return splitLocationString(text);
            }

            return [rawLocations];
        }

        function resolveStringLocation(value) {
            const text = String(value || "").trim();
            if (!text) {
                throw new Error("AMap.convertFrom returned an empty location string.");
            }

            const pair = text.split(";")[0];
            const parts = pair.split(",");
            if (parts.length < 2) {
                throw new Error("AMap.convertFrom returned an invalid location string.");
            }

            const mapLongitude = toFiniteCoordinate(parts[0]);
            const mapLatitude = toFiniteCoordinate(parts[1]);
            if (mapLongitude === null || mapLatitude === null) {
                throw new Error("AMap.convertFrom returned non-numeric coordinates.");
            }

            return {
                mapLongitude: formatCoordinate(mapLongitude),
                mapLatitude: formatCoordinate(mapLatitude),
                resultLocationKind: "string"
            };
        }

        function resolveLocation(location) {
            if (typeof location === "string") {
                return resolveStringLocation(location);
            }

            const mapLongitude = typeof location?.getLng === "function"
                ? location.getLng()
                : Array.isArray(location)
                    ? location[0]
                    : location?.lng ?? location?.longitude;
            const mapLatitude = typeof location?.getLat === "function"
                ? location.getLat()
                : Array.isArray(location)
                    ? location[1]
                    : location?.lat ?? location?.latitude;

            if (!Number.isFinite(Number(mapLongitude)) || !Number.isFinite(Number(mapLatitude))) {
                throw new Error("AMap.convertFrom returned invalid coordinates.");
            }

            return {
                mapLongitude: formatCoordinate(mapLongitude),
                mapLatitude: formatCoordinate(mapLatitude),
                resultLocationKind: valueKind(location)
            };
        }

        function validatePoint(point) {
            const rawLongitude = toFiniteCoordinate(point.rawLongitude);
            const rawLatitude = toFiniteCoordinate(point.rawLatitude);

            if (rawLongitude === null || rawLatitude === null) {
                return {
                    valid: false,
                    failure: buildFailedItem(point, {
                        hasRawCoordinate: false,
                        coordinateState: "failed",
                        coordinateStateText: "Raw coordinate format is invalid.",
                        errorStage: "payload_parse",
                        errorCode: "raw_coordinate_not_numeric",
                        errorMessage: "Input coordinates are not finite numbers."
                    })
                };
            }

            if (rawLatitude < -90 || rawLatitude > 90 || rawLongitude < -180 || rawLongitude > 180) {
                return {
                    valid: false,
                    failure: buildFailedItem(point, {
                        coordinateState: "failed",
                        coordinateStateText: "Raw coordinate is out of range.",
                        errorStage: "payload_parse",
                        errorCode: "raw_coordinate_out_of_range",
                        errorMessage: "Input coordinates are out of range."
                    })
                };
            }

            if (rawLongitude === 0 && rawLatitude === 0) {
                return {
                    valid: false,
                    failure: buildFailedItem(point, {
                        coordinateState: "failed",
                        coordinateStateText: "Raw coordinate is the 0,0 origin.",
                        errorStage: "payload_parse",
                        errorCode: "raw_coordinate_origin",
                        errorMessage: "Input coordinates are the 0,0 origin."
                    })
                };
            }

            return {
                valid: true,
                rawLongitude,
                rawLatitude
            };
        }

        function buildBatchFailure(points, errorStage, errorCode, errorMessage, amapStatus, amapInfo) {
            return (points || []).map((point) => buildFailedItem(point, {
                coordinateState: "failed",
                coordinateStateText: "Coordinate conversion failed.",
                errorStage: errorStage || "unknown",
                errorCode: errorCode || "",
                errorMessage: errorMessage || "Coordinate conversion failed.",
                amapStatus: amapStatus || "error",
                amapInfo: amapInfo || ""
            }));
        }

        async function runBatchConversion(request, config) {
            const orderedPoints = Array.isArray(request.items) ? request.items : [];
            const requestedCount = orderedPoints.length;
            const batchId = request.batchId || "";
            const itemsByIndex = new Array(requestedCount);
            const prepared = [];

            for (let index = 0; index < orderedPoints.length; index += 1) {
                const point = orderedPoints[index] || {};
                const validation = validatePoint(point);
                if (!validation.valid) {
                    itemsByIndex[index] = validation.failure;
                    postLog("AMap.convertFrom item validation failed", {
                        batchId,
                        deviceCode: point.deviceCode || "",
                        rawLongitude: point.rawLongitude ?? "",
                        rawLatitude: point.rawLatitude ?? "",
                        mapSource: point.mapSource || "amap_js_convert_from_baidu",
                        coordinateState: validation.failure.coordinateState,
                        errorStage: validation.failure.errorStage,
                        errorCode: validation.failure.errorCode,
                        errorMessage: validation.failure.errorMessage
                    }, "warning");
                    continue;
                }

                prepared.push({
                    index,
                    point,
                    rawLongitude: validation.rawLongitude,
                    rawLatitude: validation.rawLatitude
                });
            }

            if (prepared.length === 0) {
                return createEnvelope(requestedCount, itemsByIndex, []);
            }

            const callbackResult = await new Promise((resolve) => {
                let settled = false;
                const timer = window.setTimeout(() => {
                    if (settled) {
                        return;
                    }

                    settled = true;
                    postLog("AMap.convertFrom callback timeout", {
                        batchId,
                        requestedCount,
                        callbackTimeoutMs: CallbackTimeoutMs
                    }, "warning");
                    resolve({
                        timeout: true,
                        status: "error",
                        info: "callback timeout",
                        result: null
                    });
                }, CallbackTimeoutMs);

                try {
                    const sourceLocations = prepared.map((item) => [item.rawLongitude, item.rawLatitude]);
                    window.AMap.convertFrom(sourceLocations, (config && config.rawCoordinateSystem) || DefaultRawCoordinateSystem, (status, result) => {
                        if (settled) {
                            return;
                        }

                        settled = true;
                        window.clearTimeout(timer);
                        resolve({
                            timeout: false,
                            status: String(status || ""),
                            info: result && typeof result.info === "string" ? result.info.trim() : "",
                            result
                        });
                    });
                } catch (error) {
                    if (settled) {
                        return;
                    }

                    settled = true;
                    window.clearTimeout(timer);
                    resolve({
                        timeout: false,
                        thrown: error
                    });
                }
            });

            if (callbackResult.thrown) {
                const message = callbackResult.thrown && callbackResult.thrown.message
                    ? callbackResult.thrown.message
                    : "AMap.convertFrom threw an unexpected error.";
                const failures = buildBatchFailure(prepared.map((item) => item.point), "convert_from", "convert_from_exception", message, "error", "");
                prepared.forEach((item, index) => {
                    itemsByIndex[item.index] = failures[index];
                });

                postLog("AMap.convertFrom threw before callback", {
                    batchId,
                    errorStage: "convert_from",
                    errorCode: "convert_from_exception",
                    errorMessage: message
                }, "error");

                return createEnvelope(requestedCount, itemsByIndex, [
                    createBatchError("convert_from", message, "convert_from_exception")
                ]);
            }

            const status = callbackResult.status || "";
            const info = callbackResult.info || "";
            const rawLocations = callbackResult.result && Object.prototype.hasOwnProperty.call(callbackResult.result, "locations")
                ? callbackResult.result.locations
                : callbackResult.result;
            const locationsKind = valueKind(rawLocations);
            const locations = normalizeLocations(rawLocations);

            postLog("AMap.convertFrom callback received", {
                batchId,
                status,
                info,
                locationsKind,
                locationCount: locations.length,
                timeout: callbackResult.timeout ? "true" : "false"
            });

            if (callbackResult.timeout) {
                const failures = buildBatchFailure(prepared.map((item) => item.point), "callback_timeout", "convert_from_timeout", "AMap.convertFrom callback timed out.", "error", info);
                prepared.forEach((item, index) => {
                    itemsByIndex[item.index] = failures[index];
                });

                return createEnvelope(requestedCount, itemsByIndex, [
                    createBatchError("callback_timeout", "AMap.convertFrom callback timed out.", "convert_from_timeout")
                ]);
            }

            if (status !== "complete") {
                const failureMessage = info
                    ? `AMap.convertFrom failed: ${info}`
                    : "AMap.convertFrom did not return status=complete.";
                const failures = buildBatchFailure(prepared.map((item) => item.point), "convert_from", "convert_from_failed", failureMessage, "error", info);
                prepared.forEach((item, index) => {
                    itemsByIndex[item.index] = failures[index];
                });

                return createEnvelope(requestedCount, itemsByIndex, [
                    createBatchError("convert_from", failureMessage, "convert_from_failed")
                ]);
            }

            prepared.forEach((item, preparedIndex) => {
                const location = preparedIndex < locations.length ? locations[preparedIndex] : null;
                if (location === null || location === undefined) {
                    itemsByIndex[item.index] = buildFailedItem(item.point, {
                        coordinateState: "failed",
                        coordinateStateText: "AMap returned no converted coordinate.",
                        amapStatus: "no_data",
                        amapInfo: info,
                        errorStage: "result_parse",
                        errorCode: "missing_result_location",
                        errorMessage: "No converted location was returned for the current device."
                    });

                    postLog("AMap.convertFrom item failed", {
                        batchId,
                        deviceCode: item.point.deviceCode || "",
                        rawLongitude: formatCoordinate(item.rawLongitude),
                        rawLatitude: formatCoordinate(item.rawLatitude),
                        amapStatus: "no_data",
                        amapInfo: info,
                        errorStage: "result_parse",
                        errorCode: "missing_result_location",
                        errorMessage: "No converted location was returned for the current device."
                    }, "warning");
                    return;
                }

                try {
                    const resolved = resolveLocation(location);
                    itemsByIndex[item.index] = buildSuccessItem(item.point, resolved, "complete", info);
                    postLog("AMap.convertFrom item resolved", {
                        batchId,
                        deviceCode: item.point.deviceCode || "",
                        rawLongitude: formatCoordinate(item.rawLongitude),
                        rawLatitude: formatCoordinate(item.rawLatitude),
                        mapLongitude: resolved.mapLongitude,
                        mapLatitude: resolved.mapLatitude,
                        locationsKind,
                        resultLocationKind: resolved.resultLocationKind,
                        amapStatus: "complete",
                        amapInfo: info
                    });
                } catch (error) {
                    const message = error && error.message
                        ? error.message
                        : "Failed to parse converted location.";
                    itemsByIndex[item.index] = buildFailedItem(item.point, {
                        coordinateState: "failed",
                        coordinateStateText: "AMap returned an invalid converted coordinate.",
                        amapStatus: "error",
                        amapInfo: info,
                        errorStage: "result_parse",
                        errorCode: "result_location_invalid",
                        errorMessage: message
                    });

                    postLog("AMap.convertFrom item failed", {
                        batchId,
                        deviceCode: item.point.deviceCode || "",
                        rawLongitude: formatCoordinate(item.rawLongitude),
                        rawLatitude: formatCoordinate(item.rawLatitude),
                        amapStatus: "error",
                        amapInfo: info,
                        errorStage: "result_parse",
                        errorCode: "result_location_invalid",
                        errorMessage: message,
                        rawResultSnippet: summarize(location)
                    }, "warning");
                }
            });

            return createEnvelope(requestedCount, itemsByIndex, []);
        }

        window.__coordConvHost = {
            ensureReady
        };

        window.convertBd09Batch = async function(rawJson, rawConfig) {
            let request;

            try {
                request = parseBatchRequest(rawJson);
            } catch (error) {
                const message = error && error.message
                    ? error.message
                    : "Failed to parse batch request payload.";
                return JSON.stringify(createEnvelope(0, [], [
                    createBatchError("payload_parse", message, "batch_request_invalid")
                ]));
            }

            const batchId = request.batchId || "";
            const requestedCount = Array.isArray(request.items) ? request.items.length : 0;
            const startedAt = Date.now();
            const config = parseConfig(rawConfig || hostState.config || {});
            hostState.config = config;

            postLog("AMap JS batch request started", {
                batchId,
                requestedCount,
                functionName: "convertBd09Batch",
                startedAt: new Date(startedAt).toISOString()
            });

            try {
                const readyPayload = await ensureReady(config);
                if (!readyPayload.ready) {
                    const envelope = createEnvelope(
                        requestedCount,
                        buildBatchFailure(request.items, readyPayload.errorStage || "script_load", "coord_conv_host_not_ready", readyPayload.errorMessage || "CoordConvHost is not ready.", "error", ""),
                        [createBatchError(readyPayload.errorStage || "script_load", readyPayload.errorMessage || "CoordConvHost is not ready.", "coord_conv_host_not_ready")]);
                    return JSON.stringify(envelope);
                }

                const envelope = await runBatchConversion(request, config);
                postLog("AMap JS batch request completed", {
                    batchId,
                    requestedCount: envelope.requestedCount,
                    successCount: envelope.successCount,
                    failedCount: envelope.failedCount,
                    durationMs: Date.now() - startedAt
                });
                return JSON.stringify(envelope);
            } catch (error) {
                const message = error && error.message
                    ? error.message
                    : "Unexpected coord conversion host failure.";
                postLog("AMap JS batch request failed", {
                    batchId,
                    requestedCount,
                    errorStage: "convert_from",
                    errorCode: "convert_batch_failed",
                    errorMessage: message,
                    durationMs: Date.now() - startedAt
                }, "error");

                return JSON.stringify(createEnvelope(
                    requestedCount,
                    buildBatchFailure(request.items, "convert_from", "convert_batch_failed", message, "error", ""),
                    [createBatchError("convert_from", message, "convert_batch_failed")]));
            }
        };

        window.addEventListener("DOMContentLoaded", () => {
            hostState.domReady = true;
            postHostMessage("coord-conv-host-loaded", {
                loaded: true
            });
            postLog("CoordConvHost DOM loaded", {
                loaded: true
            });
        });
    </script>
</body>
</html>
